---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.15.1:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.15.1"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "node1"
    ipAddress: "192.168.5.101"
    installDisk: "/dev/vda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:54:00:ad:35:53"
        dhcp: false
        addresses:
          - "192.168.5.101/24"
        routes:
          - gateway: "10.0.15.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.15.1"
  - hostname: "node2"
    ipAddress: "192.168.5.102"
    installDisk: "/dev/vda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:54:00:20:7f:2a"
        dhcp: false
        addresses:
          - "192.168.5.102/24"
        routes:
          - gateway: "10.0.15.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.15.1"
  - hostname: "node3"
    ipAddress: "192.168.5.103"
    installDisk: "/dev/vda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:54:00:29:14:04"
        dhcp: false
        addresses:
          - "192.168.5.103/24"
        routes:
          - gateway: "10.0.15.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.15.1"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

