---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jackett
  namespace: default
spec:
  interval: 15m
  url: https://halkeye.github.io/helm-charts/jackett
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jackett
spec:
  chart:
    spec:
      chart: jackett
      version: "0.1.3"
      sourceRef:
        kind: HelmRepository
        name: jackett
      interval: 5m
  values:
    controllers:
      jackett:
        strategy: Recreate
        app:
          image:
            repository: linuxserver/jackett
            tag: latest
            pullPolicy: Always
    service:
      app:
        ports:
          http:
            port: 9117
    serviceMonitor:
      app:
        endpoints:
          - port: http
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
            - identifier: app
              port: 9117